<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>BUZZ! — Joueur</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;width:100%;background:#06080f;color:#e8edf5;font-family:'DM Sans',sans-serif;overflow:hidden;user-select:none}
    :root{--accent:#a78bfa;--accent-dark:#7c3aed;--accent-glow:#a78bfa33}
    .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .screen.active{opacity:1;pointer-events:all}
    #screen-join{background:radial-gradient(ellipse at 50% 0%,#1a0a3a 0%,#06080f 60%)}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;letter-spacing:.08em;color:var(--accent);line-height:1}
    .logo span{color:#e8edf5}
    .tagline{font-size:.72rem;letter-spacing:.25em;color:#4a5a7a;font-weight:500;text-transform:uppercase;margin-top:-8px}
    .field-group{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;margin-top:8px}
    .field-label{font-size:.7rem;font-weight:500;letter-spacing:.12em;color:#4a5a7a;text-transform:uppercase;margin-bottom:4px}
    .field-input{background:#0e1422;border:1px solid #1e2a40;border-radius:12px;color:#e8edf5;font-family:'DM Sans',sans-serif;font-size:1rem;padding:14px 16px;width:100%;outline:none;transition:border-color .2s}
    .field-input:focus{border-color:var(--accent)}
    .field-input::placeholder{color:#2a3a55}
    #input-code{text-transform:uppercase;letter-spacing:.3em;font-size:1.4rem;font-weight:700;text-align:center;font-family:'Bebas Neue',sans-serif}
    .btn-primary{width:100%;max-width:300px;padding:16px;background:var(--accent);border:none;border-radius:14px;color:white;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .15s}
    .btn-primary:active{transform:scale(0.97)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .error-msg{font-size:.8rem;color:#f87171;text-align:center;min-height:18px}
    #screen-lobby{background:radial-gradient(ellipse at 50% 0%,#0a1a2a 0%,#06080f 60%);gap:12px}
    .lobby-code{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.2em;color:#2a3a55;text-transform:uppercase}
    .lobby-code span{color:var(--accent);font-size:2rem;display:block;letter-spacing:.3em}
    .lobby-name{font-size:1.6rem;font-weight:700}
    .lobby-players{width:100%;max-width:300px;background:#0e1422;border:1px solid #1e2a40;border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px}
    .lobby-player-row{display:flex;align-items:center;gap:10px;font-size:.9rem}
    .player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .lobby-waiting{font-size:.78rem;color:#2a3a55;text-align:center;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    #screen-game{padding:0;justify-content:flex-start;background:#06080f}
    .game-header{width:100%;background:#0a0e1a;border-bottom:1px solid #1e2a40;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .game-round-name{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
    .game-round-desc{font-size:.6rem;color:#2a3a55}
    .game-timer{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:#e8edf5;transition:color .3s;min-width:40px;text-align:right}
    .game-timer.urgent{color:#f87171}
    .scores-strip{width:100%;padding:8px 16px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:#06080f;border-bottom:1px solid #1e2a4022;scrollbar-width:none}
    .scores-strip::-webkit-scrollbar{display:none}
    .score-pill{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;padding:6px 10px;background:#0e1422;border:1px solid #1e2a40;border-radius:10px;min-width:60px}
    .score-pill.me{border-color:var(--accent);background:var(--accent-glow)}
    .score-pill-name{font-size:.62rem;color:#4a5a7a;font-weight:500;white-space:nowrap;max-width:55px;overflow:hidden;text-overflow:ellipsis}
    .score-pill.me .score-pill-name{color:var(--accent)}
    .score-pill-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;line-height:1}
    .game-body{flex:1;width:100%;display:flex;flex-direction:column;padding:16px;gap:12px;overflow:hidden}
    #state-buzz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .buzz-btn{width:min(200px,55vw);height:min(200px,55vw);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:transform .1s}
    .buzz-btn:active{transform:scale(0.94)}
    .buzz-btn-inner{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
    .buzz-label{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.1em;color:white}
    .buzz-sublabel{font-size:.65rem;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase}
    .buzz-hint{font-size:.72rem;color:#2a3a55;text-align:center;max-width:220px;line-height:1.5}
    #state-answers{flex:1;display:flex;flex-direction:column;gap:10px}
    .answer-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .answer-btn{border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 10px;transition:all .15s}
    .answer-btn:active:not([disabled]){transform:scale(0.96)}
    .answer-btn[disabled]{cursor:default}
    .answer-letter{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;color:white}
    .answer-text{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.85);text-align:center;line-height:1.3}
    .answer-btn.c0{background:#1a2a6c;border:1.5px solid #2a3a8c}
    .answer-btn.c1{background:#6c1a1a;border:1.5px solid #8c2a2a}
    .answer-btn.c2{background:#1a6c3a;border:1.5px solid #2a8c4a}
    .answer-btn.c3{background:#6c5a1a;border:1.5px solid #8c7a2a}
    .answer-btn.ok{background:#14532d!important;border-color:#22c55e!important;box-shadow:0 0 20px #22c55e44}
    .answer-btn.no{background:#7f1d1d!important;border-color:#ef4444!important}
    .answer-btn.dim{opacity:.3}
    #state-waiting{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .waiting-text{font-size:.85rem;color:#4a5a7a;text-align:center}
    #state-result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .result-icon{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
    .result-icon.good{background:#14532d;border:2px solid #22c55e}
    .result-icon.bad{background:#7f1d1d;border:2px solid #ef4444}
    .result-msg{font-size:.88rem;color:#8a9ab5;text-align:center;line-height:1.5;max-width:260px}
    .result-pts{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1}
    .result-pts.good{color:#4ade80}
    .result-pts.bad{color:#f87171}
    #state-scoreboard{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
    .scoreboard-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);letter-spacing:.05em;text-align:center}
    .scoreboard-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#0e1422;border:1px solid #1e2a40;border-radius:12px}
    .scoreboard-row.me{border-color:var(--accent);background:var(--accent-glow)}
    .scoreboard-rank{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#2a3a55;min-width:28px}
    .scoreboard-name{flex:1;font-size:.9rem;font-weight:500}
    .scoreboard-pts{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent)}
    #state-final{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .final-trophy{font-size:4rem}
    .final-winner{font-size:1rem;font-weight:700;text-align:center}
    .final-winner span{color:var(--accent)}
    .pc0{background:#ef4444}.pc1{background:#3b82f6}.pc2{background:#22c55e}.pc3{background:#f59e0b}
    .pc4{background:#a855f7}.pc5{background:#ec4899}.pc6{background:#14b8a6}.pc7{background:#f97316}
  </style>
</head>
<body>

<div id="screen-join" class="screen active">
  <div class="logo">BUZZ<span>!</span></div>
  <p class="tagline">Quiz · Multijoueur</p>
  <div class="field-group">
    <div>
      <p class="field-label">Ton prénom</p>
      <input id="input-name" class="field-input" placeholder="Ex: Marie" maxlength="14" autocomplete="off"/>
    </div>
    <div>
      <p class="field-label">Code de la salle</p>
      <input id="input-code" class="field-input" placeholder="AB12C" maxlength="5" autocomplete="off"/>
    </div>
  </div>
  <button class="btn-primary" id="btn-join">Rejoindre →</button>
  <p class="error-msg" id="join-error"></p>
</div>

<div id="screen-lobby" class="screen">
  <div class="lobby-code">Salle<span id="lobby-code-val">—</span></div>
  <p class="lobby-name" id="lobby-player-name">—</p>
  <div class="lobby-players" id="lobby-players-list"></div>
  <p class="lobby-waiting">En attente du lancement…</p>
</div>

<div id="screen-game" class="screen">
  <div class="game-header">
    <div>
      <div class="game-round-name" id="hdr-round-name">—</div>
      <div class="game-round-desc" id="hdr-round-desc">—</div>
    </div>
    <div class="game-timer" id="hdr-timer">—</div>
  </div>
  <div class="scores-strip" id="scores-strip"></div>
  <div class="game-body">
    <div id="state-buzz" style="display:none">
      <button class="buzz-btn" id="buzz-btn">
        <div class="buzz-btn-inner" id="buzz-inner">
          <span class="buzz-label">BUZZ</span>
          <span class="buzz-sublabel">Appuie !</span>
        </div>
      </button>
      <p class="buzz-hint" id="buzz-hint">Sois le premier à buzzer !</p>
    </div>
    <div id="state-answers" style="display:none">
      <div class="answer-grid" id="answer-grid"></div>
    </div>
    <div id="state-waiting" style="display:none">
      <p class="waiting-text" id="waiting-text">En attente…</p>
    </div>
    <div id="state-result" style="display:none">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-pts" id="result-pts"></div>
      <p class="result-msg" id="result-msg"></p>
    </div>
    <div id="state-scoreboard" style="display:none">
      <p class="scoreboard-title">Scores</p>
      <div id="scoreboard-list"></div>
    </div>
    <div id="state-final" style="display:none">
      <div class="final-trophy">🏆</div>
      <p class="final-winner" id="final-winner-text">—</p>
      <button class="btn-primary" onclick="goHome()" style="max-width:220px;margin-top:8px">Retour à l'accueil</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  CONFIGURATION — copie de config.js
// ════════════════════════════════════════════
const FB = "https://quiz-buzz-3-default-rtdb.europe-west1.firebasedatabase.app";

const THEMES = {
  culture : { accent:"#a78bfa", dark:"#7c3aed" },
  music   : { accent:"#f472b6", dark:"#be185d" },
  cinema  : { accent:"#fbbf24", dark:"#d97706" },
  sport   : { accent:"#34d399", dark:"#059669" },
  histoire: { accent:"#d4a574", dark:"#92400e" },
  science : { accent:"#22d3ee", dark:"#0891b2" },
  geo     : { accent:"#60a5fa", dark:"#2563eb" },
  gaming  : { accent:"#c084fc", dark:"#7e22ce" },
  hp      : { accent:"#fcd34d", dark:"#92400e" },
};

const RT = [
  { id:"buzzer", name:"Buzzer Rapide",    icon:"⚡", desc:"Le plus rapide à buzzer ET correct gagne +100 pts !" },
  { id:"steal",  name:"Vol de Points",    icon:"😈", desc:"Bonne réponse → volez 50 pts !" },
  { id:"chrono", name:"Contre la Montre", icon:"⏱️", desc:"Tout le monde répond. Classement par rapidité !" },
  { id:"carton", name:"Carton Rouge",     icon:"🟥", desc:"Bonne réponse → donnez un carton !" },
  { id:"patate", name:"Patate Chaude",    icon:"🥔", desc:"Répondez avant que la patate explose !" },
  { id:"qcm",    name:"QCM Classique",    icon:"📝", desc:"Tout le monde répond. Bonne réponse = points." },
  { id:"orage",  name:"Orage de Points",  icon:"⚡", desc:"60 secondes de questions rapides !" },
];

const COLORS = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#14b8a6','#f97316'];

// ════════════════════════════════════════════
//  FIREBASE — copie de firebase.js
// ════════════════════════════════════════════
const toArr = v => {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.keys(v).sort((a,b) => +a - +b).map(k => v[k]);
};

async function fg(path) {
  try {
    const r = await fetch(`${FB}/${path}.json`);
    if (!r.ok) return null;
    const d = await r.json();
    return d !== null ? d : null;
  } catch(e) { return null; }
}

async function fs(path, data) {
  try {
    const r = await fetch(`${FB}/${path}.json`, {
      method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
    });
    return r.ok;
  } catch(e) { return false; }
}

async function fp(path, data) {
  try {
    await fetch(`${FB}/${path}.json`, {
      method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
    });
  } catch(e) {}
}

function fl(path, cb) {
  let closed = false, iv = null, es = null, ok = false;
  const poll = () => { if (!closed) fg(path).then(d => { if (d !== null && !closed) cb(d); }); };
  try {
    es = new EventSource(`${FB}/${path}.json`);
    es.addEventListener("put", e => {
      try { ok=true; if(iv){clearInterval(iv);iv=null;} const x=JSON.parse(e.data); if(x.data!==null&&!closed) cb(x.data); } catch(er){}
    });
    es.addEventListener("patch", () => { if(!closed) poll(); });
    setTimeout(() => { if(!ok&&!closed){iv=setInterval(poll,1500);poll();} }, 3500);
    es.onerror = () => { if(!ok&&!iv&&!closed){iv=setInterval(poll,1500);poll();} };
  } catch(e) { iv=setInterval(poll,1500); poll(); }
  return () => { closed=true; if(es)es.close(); if(iv)clearInterval(iv); };
}

// ════════════════════════════════════════════
//  ÉTAT LOCAL
// ════════════════════════════════════════════
let ME = "", CODE = "", MY_INDEX = -1;
let STOP_LISTENER = null;
let TIMER_IV = null;
let LAST_KEY = "";

// ════════════════════════════════════════════
//  HELPERS DOM
// ════════════════════════════════════════════
const G = id => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  G(id).classList.add('active');
}

function showState(id) {
  ['state-buzz','state-answers','state-waiting','state-result','state-scoreboard','state-final']
    .forEach(s => G(s).style.display = 'none');
  G(id).style.display = 'flex';
}

function setAccent(theme) {
  const t = THEMES[theme] || THEMES.culture;
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--accent-dark', t.dark);
  document.documentElement.style.setProperty('--accent-glow', t.accent + '33');
}

// ════════════════════════════════════════════
//  ÉCRAN JOIN
// ════════════════════════════════════════════
G('input-code').oninput = e => { e.target.value = e.target.value.toUpperCase(); };
G('btn-join').onclick = doJoin;
G('input-code').onkeydown = e => { if(e.key==='Enter') doJoin(); };
G('input-name').onkeydown = e => { if(e.key==='Enter') G('input-code').focus(); };

async function doJoin() {
  const name = G('input-name').value.trim();
  const code = G('input-code').value.trim().toUpperCase();
  const showErr = m => { G('join-error').textContent = m; };

  if (!name) { showErr("Entre ton prénom !"); return; }
  if (code.length !== 5) { showErr("Le code fait 5 caractères"); return; }

  G('btn-join').disabled = true;
  G('btn-join').textContent = '…';

  const room = await fg(`rooms/${code}`);
  if (!room) {
    showErr(`Salle "${code}" introuvable`);
    G('btn-join').disabled = false; G('btn-join').textContent = 'Rejoindre →';
    return;
  }
  if (room.phase !== 'lobby') {
    showErr("Partie déjà commencée !");
    G('btn-join').disabled = false; G('btn-join').textContent = 'Rejoindre →';
    return;
  }
  const players = toArr(room.players);
  if (players.length >= room.maxP) {
    showErr("Salle pleine !");
    G('btn-join').disabled = false; G('btn-join').textContent = 'Rejoindre →';
    return;
  }
  if (players.find(p => p.name === name)) {
    showErr("Ce prénom est déjà pris !");
    G('btn-join').disabled = false; G('btn-join').textContent = 'Rejoindre →';
    return;
  }

  // Écrire le joueur — on reécrit le tableau complet des joueurs
  // pour garantir que le listener Firebase de l'hôte se déclenche
  const newPlayers = [...players, { name, isHost: false }];
  await fs(`rooms/${code}/players`, newPlayers);

  ME = name;
  CODE = code;
  MY_INDEX = players.length;

  setAccent(room.theme || 'culture');
  enterLobby(room);
}

// ════════════════════════════════════════════
//  LOBBY
// ════════════════════════════════════════════
function enterLobby(room) {
  showScreen('screen-lobby');
  G('lobby-code-val').textContent = CODE;
  G('lobby-player-name').textContent = ME;

  if (STOP_LISTENER) STOP_LISTENER();
  STOP_LISTENER = fl(`rooms/${CODE}`, cur => {
    if (!cur) return;
    setAccent(cur.theme || 'culture');
    MY_INDEX = toArr(cur.players).findIndex(p => p.name === ME);
    if (cur.phase === 'lobby') {
      renderLobbyPlayers(toArr(cur.players));
    } else if (cur.questionsReady && cur.gameState) {
      if (STOP_LISTENER) { STOP_LISTENER(); STOP_LISTENER = null; }
      showScreen('screen-game');
      watchGame();
    }
  });
}

function renderLobbyPlayers(players) {
  G('lobby-players-list').innerHTML = players.map((p, i) => `
    <div class="lobby-player-row">
      <div class="player-dot" style="background:${COLORS[i%8]}"></div>
      <span style="font-size:.9rem;font-weight:${p.name===ME?700:400};color:${p.name===ME?'#e8edf5':'#8a9ab5'}">${p.name}</span>
    </div>
  `).join('');
}

// ════════════════════════════════════════════
//  JEU
// ════════════════════════════════════════════
function watchGame() {
  if (STOP_LISTENER) STOP_LISTENER();
  STOP_LISTENER = fl(`rooms/${CODE}`, room => {
    if (!room || !room.gameState || !room.questionsReady) return;
    const gs = room.gameState;
    MY_INDEX = toArr(gs.players).indexOf(ME);
    setAccent(room.theme || 'culture');

    const key = [gs.phase, gs.roundIdx, gs.qIdx, gs.buzzed, gs.revealed, gs.pickTarget, gs.patateHolder||''].join('-');
    if (key === LAST_KEY) return;
    LAST_KEY = key;

    updateHeader(room, gs);
    updateScores(gs);
    renderState(room, gs);
  });
}

function updateHeader(room, gs) {
  const rType = room.rounds[gs.roundIdx] || '';
  const r = RT.find(x => x.id === rType);
  const accent = (THEMES[room.theme] || THEMES.culture).accent;
  G('hdr-round-name').textContent = r ? `${r.icon} ${r.name}` : '';
  G('hdr-round-name').style.color = accent;
  G('hdr-round-desc').textContent = r ? r.desc : '';
  startTimer(gs);
}

function startTimer(gs) {
  if (TIMER_IV) clearInterval(TIMER_IV);
  const el = G('hdr-timer');
  if (!gs.timerStart || !gs.timerDur || gs.revealed) { el.textContent = '—'; el.classList.remove('urgent'); return; }
  const tick = () => {
    const left = Math.max(0, Math.round(gs.timerDur - (Date.now() - gs.timerStart) / 1000));
    el.textContent = left + 's';
    el.classList.toggle('urgent', left <= 5);
    if (left === 0) clearInterval(TIMER_IV);
  };
  tick();
  TIMER_IV = setInterval(tick, 500);
}

function updateScores(gs) {
  const players = toArr(gs.players);
  G('scores-strip').innerHTML = players.map((p, i) => `
    <div class="score-pill ${p === ME ? 'me' : ''}">
      <span class="score-pill-name">${p === ME ? 'Toi' : p}</span>
      <span class="score-pill-val">${gs.scores[i] || 0}</span>
    </div>
  `).join('');
}

function renderState(room, gs) {
  const rType = room.rounds[gs.roundIdx] || '';
  const q = (gs.rQs||{})[gs.roundIdx]?.[gs.qIdx];
  const players = toArr(gs.players);
  const isElim = (gs.roundElim||[]).includes(ME);
  const myAns = (gs.answers||{})[ME];

  if (gs.phase === 'roundIntro' || gs.phase === 'scoreboard') {
    renderScoreboard(gs);
    return;
  }
  if (gs.phase === 'final') { renderFinal(gs); return; }
  if (gs.phase !== 'question') return;

  // Résultat révélé
  if (gs.revealed && gs.result) { renderResult(gs, q); return; }

  // Éliminé
  if (isElim) {
    showState('state-waiting');
    G('waiting-text').textContent = '💀 Éliminé(e) de cette manche';
    return;
  }

  // QCM / Chrono / Orage — tout le monde répond directement
  if (['qcm','chrono','orage'].includes(rType)) {
    if (myAns !== undefined) {
      showState('state-waiting');
      G('waiting-text').textContent = '✅ Réponse envoyée ! En attente des autres…';
    } else {
      renderAnswers(gs, q);
    }
    return;
  }

  // Patate
  if (rType === 'patate') {
    if (gs.patateHolder === ME) {
      renderAnswers(gs, q);
    } else {
      showState('state-waiting');
      G('waiting-text').textContent = `🥔 ${gs.patateHolder || '?'} a la patate…`;
    }
    return;
  }

  // Buzzer / Steal / Elim / Carton
  const amBuzzer = gs.buzzed === ME;
  const buzzedOut = (gs.buzzedOut||[]).includes(ME);

  if (buzzedOut) {
    showState('state-waiting');
    G('waiting-text').textContent = '❌ Tu as déjà tenté ta chance';
    return;
  }
  if (amBuzzer) { renderAnswers(gs, q); return; }
  if (gs.buzzed && !amBuzzer) {
    showState('state-waiting');
    G('waiting-text').textContent = `🔔 ${gs.buzzed} répond…`;
    return;
  }

  // Afficher le bouton BUZZ
  showState('state-buzz');
  const idx = players.indexOf(ME);
  const color = COLORS[idx % 8];
  G('buzz-inner').style.background = color;
  G('buzz-inner').style.borderRadius = '50%';
  G('buzz-btn').onclick = actBuzz;
  const hints = { buzzer:'Sois le premier à buzzer !', steal:'Buzzez pour voler des points !', elim:'Buzzez pour éliminer quelqu\'un !', carton:'Buzzez pour donner un carton !' };
  G('buzz-hint').textContent = hints[rType] || '';
}

function renderAnswers(gs, q) {
  showState('state-answers');
  if (!q) return;
  const myAns = (gs.answers||{})[ME];
  const labels = ['A','B','C','D'];
  const colors = ['c0','c1','c2','c3'];
  G('answer-grid').innerHTML = q.a.map((ans, i) => {
    let cls = colors[i];
    if (gs.revealed) { if(i===q.c) cls+=' ok'; else if(i===myAns?.ansIdx) cls+=' no'; else cls+=' dim'; }
    const canClick = !gs.revealed && myAns === undefined;
    return `<button class="answer-btn ${cls}" ${canClick ? `onclick="actAnswer(${i})"` : 'disabled'}>
      <span class="answer-letter">${labels[i]}</span>
      <span class="answer-text">${ans}</span>
    </button>`;
  }).join('');
}

function renderResult(gs, q) {
  showState('state-result');
  const myAns = (gs.answers||{})[ME];
  const isCorrect = myAns !== undefined && myAns.ansIdx === q?.c;
  const icon = G('result-icon');
  const pts = G('result-pts');
  const msg = G('result-msg');
  if (myAns === undefined) {
    icon.className = 'result-icon bad'; icon.textContent = '⏱️';
    pts.className = 'result-pts bad'; pts.textContent = '';
    msg.textContent = 'Temps écoulé !';
  } else if (isCorrect) {
    icon.className = 'result-icon good'; icon.textContent = '✓';
    pts.className = 'result-pts good'; pts.textContent = '+' + (gs.result?.pts || 0);
    msg.textContent = gs.result?.msg || 'Bonne réponse !';
  } else {
    icon.className = 'result-icon bad'; icon.textContent = '✗';
    pts.className = 'result-pts bad'; pts.textContent = gs.result?.pts < 0 ? gs.result.pts : '';
    msg.textContent = q ? `Bonne réponse : ${q.a[q.c]}` : '';
  }
}

function renderScoreboard(gs) {
  showState('state-scoreboard');
  const players = toArr(gs.players);
  const ranked = players.map((p,i) => ({name:p, score:gs.scores[i]||0})).sort((a,b) => b.score-a.score);
  const medals = ['🥇','🥈','🥉'];
  G('scoreboard-list').innerHTML = ranked.map((p, rank) => `
    <div class="scoreboard-row ${p.name === ME ? 'me' : ''}">
      <span class="scoreboard-rank">${medals[rank] || rank+1}</span>
      <span class="scoreboard-name">${p.name}${p.name===ME?' (toi)':''}</span>
      <span class="scoreboard-pts">${p.score}</span>
    </div>
  `).join('');
}

function renderFinal(gs) {
  showState('state-final');
  const players = toArr(gs.players);
  const ranked = players.map((p,i) => ({name:p, score:gs.scores[i]||0})).sort((a,b) => b.score-a.score);
  const winner = ranked[0];
  const isMe = winner?.name === ME;
  G('final-winner-text').innerHTML = isMe
    ? `🎉 Tu as gagné avec <span>${winner.score} pts</span> !`
    : `<span>${winner?.name}</span> remporte la partie !`;
}

// ════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════
async function actBuzz() {
  const gs = await fg(`rooms/${CODE}/gameState`);
  if (!gs || gs.phase !== 'question' || gs.revealed || gs.buzzed) return;
  if ((gs.buzzedOut||[]).includes(ME) || (gs.roundElim||[]).includes(ME)) return;
  await fp(`rooms/${CODE}`, { "gameState/buzzed": ME });
}

async function actAnswer(ansIdx) {
  const gs = await fg(`rooms/${CODE}/gameState`);
  if (!gs || gs.phase !== 'question' || gs.revealed) return;
  if ((gs.answers||{})[ME] !== undefined) return;
  await fp(`rooms/${CODE}`, { [`gameState/answers/${ME}`]: { ansIdx, time: Date.now() } });
}

function goHome() {
  if (STOP_LISTENER) { STOP_LISTENER(); STOP_LISTENER = null; }
  if (TIMER_IV) clearInterval(TIMER_IV);
  ME = ''; CODE = ''; MY_INDEX = -1; LAST_KEY = '';
  G('input-name').value = '';
  G('input-code').value = '';
  G('join-error').textContent = '';
  G('btn-join').disabled = false;
  G('btn-join').textContent = 'Rejoindre →';
  setAccent('culture');
  showScreen('screen-join');
}
</script>
</body>
